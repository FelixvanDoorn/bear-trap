version: '3.8'

services:
  # --- THE TRAFFIC CAPTOR ---
  cowrie_proxy:
    image: cowrie/cowrie:latest
    container_name: aws_cowrie_proxy
    restart: always
    # Bind standard SSH (22) and Telnet (23) on AWS to Cowrie's internal ports
    ports:
      - "22:2222"
      - "23:2223"
    environment:
      - TZ=UTC
    volumes:
      # Mount configuration files to the correct home directory paths
      - ./cowrie.cfg:/home/cowrie/cowrie/etc/cowrie.cfg:ro
      - ./userdb.txt:/home/cowrie/cowrie/etc/userdb.txt:ro
      # Share logs out via the named volume
      - proxy_logs:/home/cowrie/cowrie/var/log/cowrie
    networks:
      - frontend_net

  # --- THE LOG SHIPPER ---
  log_shipper:
    image: timberio/vector:latest-alpine
    container_name: aws_vector_shipper
    restart: always
    volumes:
      # Vector reads configuration and parses shared logs from the proxy
      - ./vector.toml:/etc/vector/vector.toml:ro
      - proxy_logs:/var/log/cowrie:ro  # Read-only access for safety
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_PUBSUB_TOPIC=${GCP_PUBSUB_TOPIC}
      # Docker pulls this from your .env file and injects it into Vector
      - GOOGLE_APPLICATION_CREDENTIALS_DATA=${GOOGLE_APPLICATION_CREDENTIALS_DATA}
    depends_on:
      - cowrie_proxy
    networks:
      - frontend_net

volumes:
  proxy_logs:

networks:
  frontend_net:
    driver: bridge