version: '3.8'

services:
  # --- THE TRAFFIC CAPTOR ---
  cowrie_shell:
    image: cowrie/cowrie:latest
    container_name: aws_cowrie_control
    restart: always
    # Bind standard SSH (22) and Telnet (23) on AWS to Cowrie's internal ports
    ports:
      - "22:2222"
      - "23:2223"
    environment:
      - TZ=UTC
    # --- HARDENING PROPERTIES ---
    security_opt:
      - no-new-privileges:true  # Prevents processes from gaining more privileges (like SUID elevation)
    read_only: true              # Makes the container's core root filesystem strictly read-only
    tmpfs:
      - /tmp:rw,noexec,nosuid   # Allows Cowrie to write temp files, but blocks execution of scripts in /tmp
    deploy:
      resources:
        limits:
          cpus: '0.50'          # Prevents attackers from using your CPU to mine crypto
          memory: 512M          # Prevents Denial of Service (DoS) memory exhaustion attacks
    # ----------------------------
    volumes:
      - ./cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - control_logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - frontend_net
    volumes:
      # Mount configuration files to the correct home directory paths
      - ./cowrie.cfg:/home/cowrie/cowrie/etc/cowrie.cfg:ro
      - ./userdb.txt:/home/cowrie/cowrie/etc/userdb.txt:ro
      # Share logs out via the named volume
      - shell_logs:/home/cowrie/cowrie/var/log/cowrie
      - shell_downloads:/home/cowrie/cowrie/var/lib/cowrie/downloads
    
    networks:
      - frontend_net

  # --- THE LOG SHIPPER ---
  log_shipper:
    image: timberio/vector:latest-alpine
    container_name: aws_vector_shipper
    restart: always
    volumes:
      # Vector reads configuration and parses shared logs from the shell
      - ./vector.toml:/etc/vector/vector.toml:ro
      - shell_logs:/var/log/cowrie:ro  # Read-only access for safety
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_PUBSUB_TOPIC=${GCP_PUBSUB_TOPIC}
      # Docker pulls this from your .env file and injects it into Vector
      - GOOGLE_APPLICATION_CREDENTIALS_DATA=${GOOGLE_APPLICATION_CREDENTIALS_DATA}
    depends_on:
      - cowrie_shell
    networks:
      - frontend_net

volumes:
  shell_logs:
  # Added to keep track of any scripts the agents tries to fetch. 
  shell_downloads:

networks:
  frontend_net:
    driver: bridge