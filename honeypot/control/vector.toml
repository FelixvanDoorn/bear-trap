# ==============================================================================
# VECTOR Observability Pipeline Configuration (AWS Deployed Control Node)
# ==============================================================================

[api]
# Keeps the internal vector API endpoint closed on AWS
enabled = false 

# ------------------------------------------------------------------------------
# SOURCE: Watch Cowrie's live json log file
# ------------------------------------------------------------------------------
[sources.cowrie_logs]
type = "file"
include = ["/var/log/cowrie/cowrie.json"]
read_from = "beginning" 
ignore_older_secs = 600
# ------------------------------------------------------------------------------
# TRANSFORM: Parse Raw Text into Structured JSON & Add Metadata
# ------------------------------------------------------------------------------
[transforms.parse_and_enrich]
type = "remap"
inputs = ["cowrie_logs"]
source = """
# Parse the raw line into actual JSON fields
parsed, err = parse_json(.message)
if err != null {
  .error = "Failed to parse native Cowrie JSON"
} else {
  # Merge the parsed JSON directly into the root level of the event
  this = merge(this, parsed)
  del(.message) # Drop the redundant original text string to save bandwidth
}

# Add tracking metadata so GCP knows where this came from
.cloud_provider = "aws"
.node_role = "control_proxy"
"""
# ------------------------------------------------------------------------------
# SINK: Securely throw the JSON stream out of AWS and straight into GCP
# ------------------------------------------------------------------------------
[sinks.gcp_pubsub_sink]
type = "gcp_pubsub"
inputs = ["cowrie_logs"]
project = "${GCP_PROJECT_ID}"
topic = "${GCP_PUBSUB_TOPIC}"

[sinks.gcp_pubsub_sink.encoding]
codec = "json"