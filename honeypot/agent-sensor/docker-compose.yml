version: '3.8'

services:
  # --- THE AGENT SENSOR (REAL HONEYPOT SHELL) ---
  cowrie_detector:
    image: cowrie/cowrie:latest
    container_name: azure_cowrie_detector
    restart: always
    # Expose standard SSH (22) and Telnet (23) publicly on Azure
    ports:
      - "22:2222"
      - "23:2223"
    environment:
      - TZ=UTC
    # --- HARDENING CONSTRAINTS (Mimics our AWS control node build) ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    # -----------------------------------------------------------------
    volumes:
      # Mount your customized configs for the agent shell
      - ./cowrie.cfg:/home/cowrie/cowrie/etc/cowrie.cfg:ro
      - ./userdb.txt:/home/cowrie/cowrie/etc/userdb.txt:ro
      
      # Active python command injection files
  
      
      # Passive text files (Overrides Cowrie's internal virtual filesystem)
      - ./honeyfs:/home/cowrie/cowrie/honeyfs:ro
      
      # Share detector-specific logs out to Vector
      - detector_logs:/home/cowrie/cowrie/var/log/cowrie
      - detector_downloads:/home/cowrie/cowrie/var/lib/cowrie/downloads
      
    networks:
      - agent_detector_net

  # --- THE AZURE LOG SHIPPER (SHIPPING TO GCP SINK) ---
  log_shipper:
    image: timberio/vector:latest-alpine
    container_name: azure_vector_shipper
    restart: always
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - detector_logs:/var/log/cowrie:ro  # Read-only for security
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_PUBSUB_TOPIC=${GCP_PUBSUB_TOPIC}
      # Re-use the exact same GCP token injection logic from the AWS node script
      - GOOGLE_APPLICATION_CREDENTIALS_DATA=${GOOGLE_APPLICATION_CREDENTIALS_DATA}
    depends_on:
      - cowrie_detector
    networks:
      - agent_detector_net

volumes:
  detector_logs:
  detector_downloads:

networks:
  agent_detector_net:
    driver: bridge