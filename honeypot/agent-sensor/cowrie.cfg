[honeypot]
# CRITICAL: Switch from "proxy" to "shell" to host the actual emulated terminal
backend = shell

# A realistic corporate hostname to bypass LLM fingerprinting and encourage deep analysis
hostname = prod-api-broker

[ssh]
enabled = true
# Match the internal port mapped in your Azure docker-compose.yml
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
# CRITICAL: Explicitly enabled to capture automated IoT/Agent Telnet sprays
enabled = true
# Match the internal port mapped in your Azure docker-compose.yml
listen_endpoints = tcp:2223:interface=0.0.0.0